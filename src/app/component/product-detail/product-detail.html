<section class="mt-5" >
    <div class="rounded-2xl shadow relative ">
        <span class="bg-red-500 p-1.5 px-3 absolute top-3 right-3 text-white font-semibold rounded-[7px]">{{product.discount}}% OFF</span>
        <img class="h-62 w-full rounded-t-2xl object-cover" [src]="product.img"> 
        <p class="mt-5 text-[17px] pl-7"><strong>{{product.title}}</strong></p>
        <div class="flex gap-2.5 mt-2.5 pl-7 pb-4">
            <p class="line-through text-[15px]">${{product.oldPrice}}</p>
            <p class="text-blue-500 text-[22px]">${{product.newPrice}}</p>
        </div>
    </div>
</section>


 <!--this top and right mentioned above only works if we have absolute child and relative parent in line 3-->
