<section class="mt-5" >
    <div class="rounded-2xl shadow relative pb-5">
        <img (click)="imgClicked()" class="h-62 w-full rounded-t-2xl object-cover" [src]="products.img[0]">
        <p class="mt-5 text-[17px] pl-7"><strong>{{products.title}}</strong></p>
        <p class="mx-7 my-4 text-gray-600">{{products.description}}</p>
        <div class="flex gap-2.5 mt-2.5 pl-7 pb-4">
            <p class="line-through text-[15px]">${{products.oldPrice}}</p>
            <p class="text-blue-500 text-[22px]">${{products.newPrice}}</p>
        </div>
        <div class="ml-9 gap-3 ">
       <button (click)="addToCart()" class=" bg-blue-400 text-white p-2 px-11 py-2.5 rounded-xl w-55 text-[15px] hover:bg-blue-700 cursor-pointer"><span class="fa-solid fa-cart-shopping mt-1"></span>  Add to Cart</button>
            </div>
    </div>
</section>
