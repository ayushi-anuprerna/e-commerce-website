<section class="flex gap-12 ">
  <div class="flex-row">
    <div>
      <img [src]="mainImg" class="h-155 w-150 rounded-2xl ml-9 mt-9" />
    </div>
    <div class="flex ml-9 mt-5 mb-5 gap-5 ">
      <img (click)="changeImg(product.img[0])" [src]="product.img[0]" class="rounded-xl  hover:border-blue-400 active:border-blue-400 w-35 h-35" />
      <img (click)="changeImg(product.img[1])" [src]="product.img[1]" class="rounded-xl  hover:border-blue-400 active:border-blue-400 w-35 h-35" />
      <img (click)="changeImg(product.img[2])" [src]="product.img[2]" class="rounded-xl  hover:border-blue-400 active:border-blue-400 w-35 h-35" />
      <img (click)="changeImg(product.img[3])" [src]="product.img[3]" class="rounded-xl  hover:border-blue-400 active:border-blue-400 w-35 h-35" />
    </div>
  </div>
  <!--description section starts here-->
  <div class="w-1/2 pr-9">
    <p class="text-[24px] mt-9 mb-5">{{ product.title }}</p>
    <div>
    <span class="fa-solid fa-star text-yellow-400"></span>
    <span class="fa-solid fa-star  text-yellow-400 ml-1.5"></span>
    <span class="fa-solid fa-star text-yellow-400 ml-1.5"></span>
    <span class="fa-solid fa-star text-yellow-400 ml-1.5"></span>
    <span class="fa-solid fa-star-half-stroke text-yellow-400 ml-1.5"></span>
    <span class="ml-2">(127 reviews)</span>
    </div>
    <div class="flex mt-5 mb-5 gap-2">
        <p class="text-3xl">${{product.newPrice}}</p>
    <p class="text-2xl line-through text-gray-500">${{product.oldPrice}}</p>
    <p class="bg-red-500 p-2 text-white font-semibold rounded-[7px]">{{product.discount}}% OFF</p>
    </div>
    <hr class="text-gray-300">
    <p class="text-[14px] my-4">{{product.description}}</p>
    <p *ngFor="let item of product.features"><span class="fa-solid fa-check text-green-700 p-2"></span>{{item}}</p>
    <hr class="text-gray-300 my-3">
    <div>
        <p class="my-3 text-[15px]">Color</p>
        <div class="flex gap-4 mb-3">
        <p class="rounded-4xl bg-amber-100 w-9 h-9 border-black  hover:border-blue-400 active:border-blue-400"></p>
        <p class="rounded-4xl bg-black w-9 h-9 border-black  hover:border-blue-400 active:border-blue-400"></p>
        <p class="rounded-4xl bg-blue-300 w-9 h-9 border-black  hover:border-blue-400 active:border-blue-400"></p>
        </div>
    </div>
    <p class="text-[15px]">Size</p>
    <div class="rounded-2xl p-2 gap-4 flex">
    <button class="bg-white border-solid border border-gray-400 rounded-2xl p-3 hover:border-blue-400 active:bg-blue-400">Medium</button>
    <button class="bg-white border-solid border border-gray-400 rounded-2xl p-3 hover:border-blue-400 active:bg-blue-400">Large</button>
    <button class="bg-white border-solid border border-gray-400 rounded-2xl p-3 hover:border-blue-400 active:bg-blue-400">Extra Large</button>
    </div>
    <p class="my-3 text-[15px]">Quantity</p>
    <div class="flex gap-2.5">
        <button (click)="decrement()" class="bg-white border-solid border-2 border-black rounded-xl  w-9 h-7 font-bold">-</button>
        <p class="mt-1.5">{{count()}}</p>
        <button (click)="increment()" class="bg-white border-solid border-2 border-black rounded-xl h-7 w-9 font-bold">+</button>
    </div>
    <hr class="text-gray-300 my-5 ">
    <button class="w-full bg-blue-400 rounded-xl p-4 text-white text-[18px] hover:bg-blue-700">Add to Cart</button>
    <button class="w-full bg-white rounded-xl p-4 text-black text-[18px] mt-4 border border-gray-400 border-solid">Add to Wishlist</button>
    <hr class="text-gray-300 my-5">
    <div class="flex gap-6 mb-5">
       
    <p class="text-gray-500"><span class="fa-solid fa-truck-moving mr-2 "></span>Free shipping over $75</p>
    <p class="text-gray-500"><span class="fa-solid fa-arrow-rotate-left mr-2 "></span>30-day returns</p>
    </div>
    
    

  </div>
</section>
